<div class="form-container">
    <h2 class="card-title">Upload Document</h2>
    
    <div ng-if="error" class="alert alert-error">
        {{ error }}
    </div>
    
    <div ng-if="success" class="alert alert-success">
        {{ success }}
    </div>

    <form ng-submit="uploadDocument()">
        <div class="form-group">
            <label class="form-label" for="title">Title *</label>
            <input type="text" id="title" class="form-input" ng-model="document.title" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" class="form-textarea" ng-model="document.description"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <input type="text" id="category" class="form-input" ng-model="document.category" placeholder="e.g., Reports, Invoices">
        </div>

        <div class="form-group">
            <label class="form-label" for="tags">Tags (comma separated)</label>
            <input type="text" id="tags" class="form-input" ng-model="document.tags" placeholder="e.g., work, important, urgent">
        </div>

        <div class="form-group">
            <label class="form-label">
                <input type="checkbox" ng-model="document.isPublic"> Make this document public
            </label>
        </div>

        <div class="form-group">
            <label class="form-label" for="fileInput">Select File *</label>
            <div class="file-upload" 
                 ng-class="{dragover: isDragging}"
                 ng-drop="handleDrop($event)"
                 ng-dragover="handleDragover($event)"
                 ng-dragleave="handleDragleave($event)"
                 ng-click="triggerFileInput()">
                <input type="file" id="fileInput" class="file-input" 
                       onchange="angular.element(this).scope().setFile(this.files[0])" 
                       style="display: none;"
                       required>
                <div ng-if="!file">
                    <p>📁 Drag and drop a file here or click to select</p>
                    <p style="color: #7f8c8d; font-size: 0.9rem;">Supported formats: PDF, Images, Documents (Max 10MB)</p>
                </div>
                <div ng-if="file">
                    <p>📄 {{ file.name }}</p>
                    <p style="color: #7f8c8d; font-size: 0.9rem;">{{ formatFileSize(file.size) }}</p>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" ng-disabled="loading">
            <span ng-if="loading">Uploading...</span>
            <span ng-if="!loading">Upload Document</span>
        </button>
        
        <a href="/documents" class="btn btn-secondary" style="margin-left: 1rem;">Cancel</a>
    </form>
</div>
