<div class="form-container">
    <h2 class="card-title">Register</h2>
    
    <div ng-if="error" class="alert alert-error">
        {{ error }}
    </div>
    
    <div ng-if="success" class="alert alert-success">
        {{ success }}
    </div>

    <form ng-submit="register()">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" class="form-input" ng-model="user.username" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" ng-model="user.email" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" ng-model="user.password" required>
        </div>

        <button type="submit" class="btn btn-primary" ng-disabled="loading">
            <span ng-if="loading">Registering...</span>
            <span ng-if="!loading">Register</span>
        </button>
    </form>

    <div style="margin-top: 1rem; text-align: center;">
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>
